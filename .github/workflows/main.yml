# ============================================================
# 招聘信息自动化获取推送助手 - GitHub Actions 定时任务
# 每天 UTC 0:00（北京时间早上 8:00）自动运行
# ============================================================

name: 📊 每日招聘信息抓取

on:
  # 定时触发：每天 UTC 0:00（即北京时间 08:00）
  schedule:
    - cron: "0 0 * * *"
  # 也支持手动触发（便于调试）
  workflow_dispatch:

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      # 从 GitHub Secrets 读取飞书配置
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      FEISHU_APP_TOKEN: ${{ secrets.FEISHU_APP_TOKEN }}
      FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}

    steps:
      # 1. 检出代码
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. 缓存 pip 依赖
      - name: 📦 Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. 安装 Python 依赖
      - name: 📚 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5. 缓存 Playwright 浏览器
      - name: 🌐 Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      # 6. 安装 Playwright Chromium 浏览器及系统依赖
      - name: 🌐 Install Playwright Chromium
        run: |
          playwright install chromium
          playwright install-deps chromium

      # 7. 运行主程序
      - name: 🚀 Run scraper & sync to Feishu
        run: |
          python main.py

      # 8. 上传 CSV 备份作为 artifact（保留 7 天）
      - name: 📎 Upload CSV backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-data-${{ github.run_number }}
          path: "output/*.csv"
          retention-days: 7
